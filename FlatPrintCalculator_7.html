<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flat Print Pricing Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f3;min-height:100vh;padding:20px}
.calc{max-width:780px;margin:0 auto}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:24px}
.section{margin-bottom:16px;padding:16px 20px;background:#fff;border:1px solid #e5e5e5;border-radius:10px}
.stitle{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.f{display:flex;flex-direction:column;gap:4px}
.f label{font-size:11px;color:#666;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
select,input[type=text],input[type=number]{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
select:focus,input:focus{border-color:#378add}
textarea{width:100%;min-height:70px;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;resize:vertical;color:#1a1a1a;background:#fff;outline:none}
textarea:focus{border-color:#378add}
.tg{display:flex;gap:6px}
.t{flex:1;padding:8px;border:1px solid #ddd;border-radius:7px;font-size:13px;cursor:pointer;text-align:center;background:#fff;color:#666;user-select:none;font-weight:600}
.t:hover{background:#f5f5f5}
.t.on{border-color:#185FA5;background:#e8f2fc;color:#185FA5}
.item-row{background:#f8f8f7;border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid #ebebeb}
.item-row:last-child{margin-bottom:0}
.item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.item-num{font-size:11px;font-weight:700;color:#888;text-transform:uppercase}
.item-remove{font-size:11px;color:#e24b4a;cursor:pointer;padding:2px 6px;border:1px solid #f0b0b0;border-radius:5px;background:#fff8f8}
.item-remove:hover{background:#fee}
.add-btn{width:100%;padding:9px;border:1px dashed #ccc;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#888;margin-top:4px}
.add-btn:hover{border-color:#378add;color:#185FA5;background:#f0f7ff}
.rg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.mt{padding:12px 14px;background:#f8f8f7;border-radius:8px}
.ml{font-size:10px;color:#999;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.mv{font-size:20px;font-weight:700;color:#1a1a1a}
.mv.g{color:#0a6649}
.mv.r{color:#a32d2d}
table.li{width:100%;font-size:13px;border-collapse:collapse}
table.li tr{border-bottom:1px solid #f0f0f0}
table.li tr:last-child{border-bottom:none}
table.li td{padding:6px 4px;color:#444}
table.li td:last-child{text-align:right;font-weight:600;color:#1a1a1a}
table.li .tot td{font-weight:700;font-size:14px;padding-top:10px;border-top:2px solid #e5e5e5}
.pay-box{margin-top:12px;padding:10px 12px;background:#f8f8f7;border-radius:8px;font-size:12px}
.pay-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#888;margin-bottom:8px}
.sub-box{margin-top:12px;padding:12px 14px;background:#e8f2fc;border-radius:8px;border:1px solid #b5d4f4}
.sub-label{font-size:11px;color:#185FA5;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sub-range{font-size:18px;font-weight:700;color:#0C447C}
.sub-note{font-size:11px;color:#378add;margin-top:4px}
.em{text-align:center;padding:2rem;color:#999;font-size:13px}
.bc{width:100%;padding:11px;border:1px solid #ddd;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:#1a1a1a;color:#fff;margin-top:14px}
.bc:hover{background:#333}
.bc.ok{background:#0F6E56}
.hint{font-size:11px;color:#aaa;margin-top:3px}
.tag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:4px;margin-left:4px;font-weight:600}
.tax{background:#fef3e2;color:#9a6200}
.notax{background:#e8f5e9;color:#2e7d32}
@media(max-width:540px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.rg{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="calc">
<h1>Flat Print Pricing Calculator</h1>
<p class="subtitle">Flat Print &nbsp;·&nbsp; Decals &amp; Stickers &nbsp;·&nbsp; RTA Cut Vinyl</p>

<div class="section">
<div class="stitle">Job Info</div>
<div class="grid2">
<div class="f"><label>Company Name</label><input type="text" id="co" placeholder="ABC Plumbing Co."></div>
<div class="f"><label>Contact Name</label><input type="text" id="ct" placeholder="John Smith"></div>
</div>
</div>

<div class="section">
<div class="stitle">Line Items</div>
<div id="items-container"></div>
<button class="add-btn" onclick="addItem()">+ Add Another Item</button>
</div>

<div class="section">
<div class="stitle">Notes</div>
<textarea id="job-notes" placeholder="Special requirements, colors, turnaround time, anything the production team needs to know..."></textarea>
</div>

<div class="section">
<div class="stitle">Design Services</div>
<div class="grid2">
<div class="f"><label>Wrap / Print Design</label>
<select id="dw" onchange="calcDesign()">
<option value="0">None</option>
<option value="149">File Setup Only — $149 (client provides print-ready file)</option>
<option value="149b">L&amp;L Layout — $149 (arrange provided logos/text into layout)</option>
<option value="199">Quarter Wrap Design — $199</option>
<option value="499">Half Wrap Design — $499</option>
<option value="499f">Full Wrap Design — $499</option>
</select></div>
<div class="f"><label>Logo / Branding</label>
<select id="dl" onchange="calcDesign()">
<option value="0">None</option>
<option value="149">Logo Refresh — $149 (update colors/fonts on existing logo)</option>
<option value="199">Basic Logo — $199 (simple text + icon, 1-2 revisions)</option>
<option value="349">Custom Logo — $349 (unique design, multiple concepts, full revisions)</option>
<option value="499">Basic Mascot — $499 (simple character, limited detail)</option>
<option value="799">Semi-Custom Mascot — $799 (detailed character, moderate complexity)</option>
<option value="1200">Custom Mascot — $1,200 (fully custom character, high detail, full revisions)</option>
<option value="599">Basic Branding Package — $599 (logo + 1 color palette + basic guidelines)</option>
<option value="999">Standard Branding Package — $999 (logo + colors + fonts + business card + letterhead)</option>
<option value="1799">Full Branding Package — $1,799 (complete brand identity: logo, colors, fonts, all collateral + brand guide)</option>
</select></div>
</div>
</div>

<div class="section">
<div id="em" class="em">Add at least one item to see pricing</div>
<div id="cn" style="display:none">
<div class="rg">
<div class="mt"><div class="ml">Price to Client</div><div class="mv" id="r-tot"></div></div>
<div class="mt"><div class="ml">Your Cost</div><div class="mv" id="r-cst"></div></div>
<div class="mt"><div class="ml">Gross Profit</div><div class="mv g" id="r-prf"></div></div>
</div>
<table class="li">
<tbody id="line-rows"></tbody>
<tr id="des-row" style="display:none"><td>Design Services</td><td id="des-val"></td></tr>
<tr class="tot"><td>Total to Client</td><td id="totv"></td></tr>
</table>
<div class="pay-box" id="pay-box" style="display:none">
<div class="pay-title">Your Pay Obligations (30%)</div>
<table style="width:100%;border-collapse:collapse;font-size:12px" id="pay-rows"></table>
</div>
<button class="bc" id="cbtn" onclick="copyEst()">Copy Estimate to Clipboard</button>
</div>
</div>
</div>

<script>
// ── RATES ──
const LABOR=100, INK_COST=0.25, INK_SELL=1.0, PRINT_SPD=600;
const CUT_SPD=120, CUT_MAT=0.10;
const WEED_SPD={simple:40,avg:120,complex:15};
const MASK_SPD=240, MASK_MAT_COST=0.25, MASK_MAT_SELL=0.50;
const RTA_MASK_COST=0.12, RTA_MASK_SELL=0.35;
const MU_FLAT=2.22, MU_DECAL=4.0, MU_RTA=2.5;
const MIN_DECAL=1.50;
const IHR={simple:6,avg:7,complex:9}, SP=2, PP=0.30;

// ── MATERIALS ──
const FLAT_MATS={
  'Cast-3M-IJ180CV3':1.45,
  'Cast-Brightline (Economy)':0.86,
  'Reflective-3M':5.56,
  'Reflective-Briteline (Economy)':4.77,
  'Perf-Briteline 70/30':0.81,
  'Perf-3M 50/50':2.53,
  'Dusted Mactac B-Free':1.22,
  'Alumigraphics Wall':4.01,
  'Alumigraphics Floor':4.85,
  'Wall Vinyl Smooth':0.59,
  'Wall Vinyl Canvas':0.62,
  'Wall Vinyl Sand':0.65,
  'Wall Vinyl Linen':0.68
};
const LAMS={
  'None':0,
  'Cast-3M 8518-Gloss':0.96,
  'Cast-3M 8520 Matte':1.15,
  'Cast-Brightline-Gloss':1.15,
  'Cast-Brightline-Matte':0.66,
  'Calendered-3M-8508':0.66,
  'Calendered-Brightline-Gloss':0.66,
  'Calendered-Brightline-Matte':0.46
};
const RTA_COLORS={
  'White':0.5133,'Black':0.5133,'Silver':0.5133,'Gold':0.5133,
  'Red':0.5133,'Dark Red':0.5133,'Blue':0.5133,'Dark Blue':0.5133,
  'Navy':0.5133,'Green':0.5133,'Dark Green':0.5133,'Yellow':0.5133,
  'Orange':0.5133,'Purple':0.5133,'Brown':0.5133,'Gray':0.5133,
  'Light Gray':0.5133,'Pink':0.5133,'Cream':0.5133,'Beige':0.5133,
  '3M Reflective':3.25
};

let itemCount=0;
const items=[];

function gi(id){return document.getElementById(id);}
function fmt(n){return '$'+Math.abs(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function fmtSf(n){return n.toFixed(2)+' sf';}

function matOptions(type){
  if(type==='rta'){
    return Object.keys(RTA_COLORS).map(k=>`<option value="${k}">${k}</option>`).join('');
  }
  return Object.keys(FLAT_MATS).map(k=>`<option value="${k}"${k==='Cast-3M-IJ180CV3'?' selected':''}>${k} ($${FLAT_MATS[k].toFixed(2)})</option>`).join('');
}
function lamOptions(){
  return Object.keys(LAMS).map(k=>`<option value="${k}"${k==='Cast-3M 8518-Gloss'?' selected':''}>${k==='None'?'None':k+' ($'+LAMS[k].toFixed(2)+')'}</option>`).join('');
}

function buildItemHTML(id){
  return `<div class="item-row" id="item-${id}">
<div class="item-header">
  <span class="item-num">Item ${id}</span>
  <span class="item-remove" onclick="removeItem(${id})">Remove</span>
</div>
<div class="grid2" style="margin-bottom:10px">
  <div class="f"><label>Job Type</label>
  <select id="type-${id}" onchange="onTypeChange(${id})">
    <option value="flat">Flat Print</option>
    <option value="decal">Decals &amp; Stickers</option>
    <option value="rta">RTA Cut Vinyl</option>
  </select></div>
  <div class="f"><label>Description</label><input type="text" id="desc-${id}" placeholder="e.g. Door magnets, window decals..." oninput="calc()"></div>
</div>
<div class="grid4" style="margin-bottom:10px">
  <div class="f"><label>Width (in)</label><input type="number" id="w-${id}" min="0" step="0.5" placeholder="24" oninput="calc()"></div>
  <div class="f"><label>Height (in)</label><input type="number" id="h-${id}" min="0" step="0.5" placeholder="18" oninput="calc()"></div>
  <div class="f"><label>Qty</label><input type="number" id="qty-${id}" min="1" value="1" oninput="calc()"></div>
  <div class="f"><label>Sq Ft</label><input type="text" id="sf-${id}" readonly style="background:#f5f5f3;color:#888"></div>
</div>
<div class="grid3" style="margin-bottom:10px" id="mat-row-${id}">
  <div class="f"><label>Material</label><select id="mat-${id}" onchange="calc()">${matOptions('flat')}</select></div>
  <div class="f" id="lam-col-${id}"><label>Laminate</label><select id="lam-${id}" onchange="calc()">${lamOptions()}</select></div>
  <div class="f" id="weed-col-${id}" style="display:none"><label>Weed Complexity</label>
  <select id="weed-${id}" onchange="calc()">
    <option value="avg">Average</option>
    <option value="simple">Simple</option>
    <option value="complex">Complex</option>
  </select></div>
  <div class="f" id="rollsf-col-${id}" style="display:none"><label>Price On</label>
  <select id="rollsf-${id}" onchange="calc()">
    <option value="image">Image SqFt (exact size)</option>
    <option value="roll">Roll SqFt (includes waste)</option>
  </select>
  <span style="font-size:10px;color:#aaa;margin-top:2px" id="rollsf-hint-${id}"></span>
  </div>
</div>
<div style="display:flex;gap:12px;flex-wrap:wrap" id="opts-row-${id}">
  <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer" id="mask-opt-${id}" style="display:none">
    <input type="checkbox" id="mask-${id}" onchange="calc()" style="accent-color:#185FA5"> Add Masking
  </label>
  <div class="f" id="install-col-${id}">
    <label>Install</label>
    <div class="tg" style="min-width:160px">
      <div class="t on" id="iih-${id}" onclick="setIT(${id},'ih')">In-House</div>
      <div class="t" id="isub-${id}" onclick="setIT(${id},'sub')">Sub</div>
      <div class="t on" id="inone-${id}" onclick="setIT(${id},'none')" style="border-color:#185FA5;background:#e8f2fc;color:#185FA5">None</div>
    </div>
  </div>
  <div class="f" id="ship-col-${id}">
    <label>Shipping</label>
    <div class="tg" style="min-width:140px">
      <div class="t on" id="snone-${id}" onclick="setSH(${id},'none')">None</div>
      <div class="t" id="sstd-${id}" onclick="setSH(${id},'std')">FedEx $75</div>
      <div class="t" id="sexp-${id}" onclick="setSH(${id},'exp')">Expedited $150</div>
    </div>
  </div>
  <div class="f" id="travel-col-${id}">
    <label>Travel</label>
    <div style="display:flex;align-items:center;gap:5px">
      <select id="tcrew-${id}" onchange="calc()" style="padding:5px 6px;font-size:12px;border:1px solid #ddd;border-radius:6px">
        <option value="0">None</option>
        <option value="1">1 Installer $85/hr</option>
        <option value="2">2 Installers $105/hr</option>
      </select>
      <input type="number" id="thrs-${id}" value="1" min="0.5" step="0.5" style="width:48px;padding:5px 6px;font-size:12px;border:1px solid #ddd;border-radius:6px" oninput="calc()">
      <span style="font-size:11px;color:#bbb">hrs</span>
    </div>
  </div>
</div>
</div>`;
}

function addItem(){
  itemCount++;
  const id=itemCount;
  items.push({id,it:'none',sh:'none'});
  const container=gi('items-container');
  const div=document.createElement('div');
  div.innerHTML=buildItemHTML(id);
  container.appendChild(div.firstChild);
  // default install toggle state
  setIT(id,'none');
  calc();
}

function removeItem(id){
  const el=gi(`item-${id}`);
  if(el)el.remove();
  const idx=items.findIndex(i=>i.id===id);
  if(idx>-1)items.splice(idx,1);
  calc();
}

function setIT(id,v){
  const item=items.find(i=>i.id===id);
  if(item)item.it=v;
  ['ih','sub','none'].forEach(k=>{
    const el=gi(`i${k}-${id}`);
    if(el)el.classList.toggle('on',k===v);
  });
  calc();
}

function setSH(id,v){
  const item=items.find(i=>i.id===id);
  if(item)item.sh=v;
  ['none','std','exp'].forEach(k=>{
    const el=gi(`s${k}-${id}`);
    if(el)el.classList.toggle('on',k===v);
  });
  calc();
}

function onTypeChange(id){
  const type=gi(`type-${id}`).value;
  const lamCol=gi(`lam-col-${id}`);
  const weedCol=gi(`weed-col-${id}`);
  const maskOpt=gi(`mask-opt-${id}`);
  const matSel=gi(`mat-${id}`);
  if(type==='rta'){
    lamCol.style.display='none';
    weedCol.style.display='none';
    gi(`rollsf-col-${id}`).style.display='none';
    maskOpt.style.display='flex';
    matSel.innerHTML=matOptions('rta');
  } else if(type==='decal'){
    lamCol.style.display='none';
    weedCol.style.display='';
    gi(`rollsf-col-${id}`).style.display='';
    maskOpt.style.display='flex';
    matSel.innerHTML=matOptions('flat');
  } else {
    lamCol.style.display='';
    weedCol.style.display='none';
    gi(`rollsf-col-${id}`).style.display='';
    maskOpt.style.display='none';
    matSel.innerHTML=matOptions('flat');
  }
  calc();
}

function calcDesign(){calc();}
['dw','dl'].forEach(id=>{const el=gi(id);if(el)el.addEventListener('change',calc);});

function getDesignTotal(){
  const dwv=gi('dw')?.value||'0';
  const dlv=gi('dl')?.value||'0';
  return (dwv==='149b'||dwv==='499f'?149:+dwv||0)+(+dlv||0);
}
  const type=gi(`type-${id}`)?.value;
  const w=parseFloat(gi(`w-${id}`)?.value)||0;
  const h=parseFloat(gi(`h-${id}`)?.value)||0;
  const qty=Math.max(1,parseInt(gi(`qty-${id}`)?.value)||1);
  if(!w||!h)return null;

  const imgSf=(w*h/144)*qty;
  if(type==='rta') gi(`sf-${id}`).value=fmtSf(imgSf);

  const item=items.find(i=>i.id===id)||{it:'none',sh:'none'};
  const it=item.it, sh=item.sh;
  const desc=gi(`desc-${id}`)?.value||'';
  const matKey=gi(`mat-${id}`)?.value||'';
  const masked=gi(`mask-${id}`)?.checked||false;

  let matCost=0, sellPrice=0, prodCost=0, finishLabor=0, finishMat=0;
  let instSell=0, instCost=0;

  if(type==='flat'){
    const mc=FLAT_MATS[matKey]||0;
    const lc=LAMS[gi(`lam-${id}`)?.value||'None']||0;
    const rollWidth=54; const bleed=2;
    const acrossPerRow=Math.max(1,Math.floor((rollWidth-bleed*2)/w));
    const rollSf=((rollWidth/12)*(h/12)/acrossPerRow)*qty;
    const useRoll=gi(`rollsf-${id}`)?.value==='roll';
    const costSf=useRoll?rollSf:imgSf;
    const hintEl=gi(`rollsf-hint-${id}`);
    if(hintEl) hintEl.textContent=useRoll
      ?`${acrossPerRow} across on 54" roll → ${rollSf.toFixed(2)} sf used`
      :`Image only: ${imgSf.toFixed(2)} sf`;
    gi(`sf-${id}`).value=fmtSf(costSf);
    const printHrs=costSf/PRINT_SPD;
    const printLaborCost=printHrs*LABOR;
    prodCost=Math.round((mc+INK_COST+lc)*costSf*100)/100+Math.round(printLaborCost*100)/100;
    sellPrice=Math.round(prodCost*MU_FLAT*100)/100;

  } else if(type==='decal'){
    const mc=FLAT_MATS[matKey]||0;
    // Roll sqft calculation
    const rollWidth=54; const bleed=2;
    const acrossPerRow=Math.max(1,Math.floor((rollWidth-bleed*2)/w));
    const rollSf=((rollWidth/12)*(h/12)/acrossPerRow)*qty;
    const useRoll=gi(`rollsf-${id}`)?.value==='roll';
    const costSf=useRoll?rollSf:imgSf;
    // Show hint
    const hintEl=gi(`rollsf-hint-${id}`);
    if(hintEl){
      hintEl.textContent=useRoll
        ?`${acrossPerRow} across on 54" roll → ${rollSf.toFixed(2)} sf used`
        :`Image only: ${imgSf.toFixed(2)} sf`;
    }
    gi(`sf-${id}`).value=fmtSf(costSf);
    const printHrs=costSf/PRINT_SPD;
    const printLaborCost=printHrs*LABOR;
    const cutHrs=costSf/CUT_SPD;
    const cutLaborCost=cutHrs*LABOR;
    const cutMatCost=CUT_MAT*costSf;
    const weedKey=gi(`weed-${id}`)?.value||'avg';
    const weedHrs=costSf/WEED_SPD[weedKey];
    const weedLaborCost=weedHrs*LABOR;
    finishLabor=Math.round((cutLaborCost+weedLaborCost)*100)/100;
    finishMat=Math.round(cutMatCost*100)/100;
    let maskMatC=0, maskMatS=0;
    if(masked){maskMatC=MASK_MAT_COST*costSf;maskMatS=MASK_MAT_SELL*costSf;}
    prodCost=Math.round((mc+INK_COST)*costSf*100)/100+Math.round(printLaborCost*100)/100+finishLabor+finishMat+maskMatC;
    const baseSell=Math.round(prodCost*MU_DECAL*100)/100;
    const perPiece=baseSell/qty;
    const finalPerPiece=Math.max(perPiece,MIN_DECAL);
    sellPrice=Math.round(finalPerPiece*qty*100)/100+Math.round(maskMatS*100)/100;

  } else if(type==='rta'){
    const mc=RTA_COLORS[matKey]||0.5133;
    const cutHrs=imgSf/200;
    const cutLaborCost=cutHrs*LABOR;
    finishLabor=Math.round(cutLaborCost*100)/100;
    let maskMatC=0, maskMatS=0;
    if(masked){maskMatC=RTA_MASK_COST*imgSf;maskMatS=RTA_MASK_SELL*imgSf;}
    prodCost=Math.round(mc*imgSf*100)/100+finishLabor+maskMatC;
    sellPrice=Math.round(prodCost*MU_RTA*100)/100+Math.round(maskMatS*100)/100;
  }

  // Install
  if(it!=='none'){
    const diff=imgSf>=300?'simple':imgSf>=200?'avg':'complex';
    const ir=it==='ih'?IHR[diff]:IHR[diff]+SP;
    instSell=Math.round(ir*imgSf*100)/100;
    instCost=Math.round(instSell*PP*100)/100;
  }

  // Shipping
  const shipSell=sh==='std'?75:sh==='exp'?150:0;

  // Travel
  const crewCount=parseInt(gi(`tcrew-${id}`)?.value)||0;
  const tHrs=Math.max(0.5,parseFloat(gi(`thrs-${id}`)?.value)||1);
  const travelSell=crewCount===0?0:Math.round((crewCount===2?105:85)*tHrs*100)/100;
  const travelCost=crewCount===0?0:Math.round((crewCount===2?30:15)*tHrs*100)/100;

  const total=sellPrice+instSell+shipSell+travelSell;
  const cost=prodCost+instCost+travelCost;

  return{id,type,desc,matKey,imgSf,sellPrice,prodCost,instSell,instCost,instType:it,shipSell,travelSell,travelCost,crewCount,tHrs,total,cost,qty,w,h};
}

function calc(){
  const rows=gi('line-rows');
  const payRows=gi('pay-rows');
  rows.innerHTML=''; payRows.innerHTML='';
  let grandTot=0, grandCost=0, totalInstSell=0, totalTravelCost=0;
  const results=[];

  // collect all active item ids from DOM
  const activeIds=[...gi('items-container').querySelectorAll('.item-row')]
    .map(el=>parseInt(el.id.split('-')[1]));

  activeIds.forEach(id=>{
    const r=calcItem(id);
    if(!r)return;
    results.push(r);
    grandTot+=r.total; grandCost+=r.cost;
    totalInstSell+=r.instSell;
    totalTravelCost+=(r.travelCost||0);

    const label=r.desc||(r.type==='flat'?'Flat Print':r.type==='decal'?'Decals & Stickers':'RTA Cut Vinyl');
    const sfStr=`${r.imgSf.toFixed(2)} sf`;

    // Material row
    const tr1=document.createElement('tr');
    tr1.innerHTML=`<td>${label} — Material <span class="tag tax">taxable</span><br><span style="font-size:11px;color:#aaa">${r.w}"×${r.h}" qty ${r.qty} = ${sfStr}</span></td><td>${fmt(r.sellPrice)}</td>`;
    rows.appendChild(tr1);

    // Install row
    if(r.instSell>0){
      const tr2=document.createElement('tr');
      tr2.innerHTML=`<td>${label} — Install (${r.instType==='ih'?'In-House':'Sub'}) <span class="tag notax">non-taxable</span></td><td>${fmt(r.instSell)}</td>`;
      rows.appendChild(tr2);
    }

    // Shipping row
    if(r.shipSell>0){
      const tr3=document.createElement('tr');
      tr3.innerHTML=`<td>${label} — Shipping</td><td>${fmt(r.shipSell)}</td>`;
      rows.appendChild(tr3);
    }
    // Travel row
    if(r.travelSell>0){
      const tr4=document.createElement('tr');
      tr4.innerHTML=`<td>${label} — Travel (${r.crewCount} installer${r.crewCount>1?'s':''}, ${r.tHrs} hr${r.tHrs!==1?'s':''}) <span class="tag notax">non-taxable</span></td><td>${fmt(r.travelSell)}</td>`;
      rows.appendChild(tr4);
    }
  });

  if(!results.length){
    gi('em').style.display='block'; gi('cn').style.display='none'; return;
  }

  const dv=getDesignTotal();
  grandTot+=dv;
  const desPay=Math.round(dv*0.30*100)/100;

  const prf=Math.round((grandTot-grandCost)*100)/100;
  const mg=grandTot>0?prf/grandTot:0;

  gi('r-tot').textContent=fmt(grandTot);
  gi('r-cst').textContent=fmt(grandCost);
  gi('r-prf').textContent=fmt(prf)+' ('+Math.round(mg*100)+'%)';
  gi('r-prf').className='mv '+(mg>=0.4?'g':'r');
  gi('totv').textContent=fmt(grandTot);
  gi('des-row').style.display=dv>0?'':'none';
  if(dv>0)gi('des-val').textContent=fmt(dv);

  // Pay obligations
  if(totalInstSell>0||totalTravelCost>0||desPay>0){
    gi('pay-box').style.display='block';
    if(totalInstSell>0){
      const instPay=Math.round(totalInstSell*PP*100)/100;
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="padding:4px 0;color:#444">Installer Pay (30% of install)</td><td style="text-align:right;font-weight:600">${fmt(instPay)}</td>`;
      payRows.appendChild(tr);
    }
    if(totalTravelCost>0){
      const tr2=document.createElement('tr');
      tr2.innerHTML=`<td style="padding:4px 0;color:#444">Installer Travel Pay ($15/installer/hr)</td><td style="text-align:right;font-weight:600">${fmt(totalTravelCost)}</td>`;
      payRows.appendChild(tr2);
    }
    if(desPay>0){
      const tr3=document.createElement('tr');
      tr3.innerHTML=`<td style="padding:4px 0;color:#444">Designer Pay (30% of design)</td><td style="text-align:right;font-weight:600">${fmt(desPay)}</td>`;
      payRows.appendChild(tr3);
    }
  } else {
    gi('pay-box').style.display='none';
  }

  gi('em').style.display='none'; gi('cn').style.display='block';
  window._L={results,grandTot,grandCost,prf,mg,totalInstSell,totalTravelCost,dv,desPay};
}

function copyEst(){
  const d=window._L;
  if(!d){alert('Add items first.');return;}
  const co=gi('co').value||'—', ct=gi('ct').value||'—';
  const notes=gi('job-notes').value.trim();
  const lines=['FLAT PRINT PRICING ESTIMATE','='.repeat(46),
    `Company:  ${co}`,`Contact:  ${ct}`,`Date:     ${new Date().toLocaleDateString()}`,''];

  lines.push('--- PRICING BREAKDOWN ---');
  lines.push('  [TAXABLE — MATERIAL]');
  d.results.forEach(r=>{
    const label=r.desc||(r.type==='flat'?'Flat Print':r.type==='decal'?'Decals & Stickers':'RTA Cut Vinyl');
    lines.push(`  ${label} (${r.w}"×${r.h}" qty ${r.qty}):  ${fmt(r.sellPrice)}`);
  });
  const hasInst=d.results.some(r=>r.instSell>0);
  if(hasInst){
    lines.push('  [NON-TAXABLE — LABOR/INSTALL]');
    d.results.filter(r=>r.instSell>0).forEach(r=>{
      const label=r.desc||(r.type==='flat'?'Flat Print':r.type==='decal'?'Decals & Stickers':'RTA Cut Vinyl');
      lines.push(`  ${label} Install (${r.instType==='ih'?'In-House':'Sub'}):  ${fmt(r.instSell)}`);
    });
  }
  const hasShip=d.results.some(r=>r.shipSell>0);
  if(hasShip){
    d.results.filter(r=>r.shipSell>0).forEach(r=>{
      const label=r.desc||(r.type==='flat'?'Flat Print':r.type==='decal'?'Decals':r.type);
      lines.push(`  ${label} Shipping:  ${fmt(r.shipSell)}`);
    });
  }
  lines.push('─'.repeat(34));
  lines.push(`TOTAL TO CLIENT:  ${fmt(d.grandTot)}`);
  lines.push('');
  if(d.totalInstSell>0||d.totalTravelCost>0||d.desPay>0){
    lines.push('--- YOUR PAY OBLIGATIONS ---');
    if(d.totalInstSell>0){
      const instPay=Math.round(d.totalInstSell*PP*100)/100;
      lines.push(`Installer Pay (30%):      ${fmt(instPay)}`);
    }
    if(d.totalTravelCost>0) lines.push(`Installer Travel Pay:     ${fmt(d.totalTravelCost)}`);
    if(d.desPay>0) lines.push(`Designer Pay (30%):       ${fmt(d.desPay)}`);
    lines.push('');
  }
  if(d.dv>0) lines.push(`  Design Services:  ${fmt(d.dv)}`);
  lines.push(`Your Total Cost:  ${fmt(d.grandCost)}`);
  lines.push(`Gross Profit:     ${fmt(d.prf)} (${Math.round(d.mg*100)}%)`);
  if(notes){lines.push('');lines.push('NOTES:');lines.push(notes);}
  lines.push('');lines.push('='.repeat(46));

  navigator.clipboard.writeText(lines.join('\n')).then(()=>{
    const b=gi('cbtn');b.textContent='Copied!';b.classList.add('ok');
    setTimeout(()=>{b.textContent='Copy Estimate to Clipboard';b.classList.remove('ok');},2500);
  }).catch(()=>{
    const w=window.open('','_blank');
    if(w)w.document.write('<pre style="font:13px monospace;padding:20px">'+lines.join('\n')+'</pre>');
  });
}

// Start with one item
addItem();
</script>
